<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio Playlist • Música da Semana</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET E VARIÁVEIS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            background-color: #000000 !important;
        }

        /* Temas (apenas um exemplo, pode manter todos) */
        body.theme-red {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }
        /* ... outros temas podem ser mantidos, mas vamos simplificar com apenas um */

        body {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }

        .app {
            max-width: 420px;
            width: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* TOP BAR */
        .top-bar {
            background: #000;
            border-top: 3px solid var(--primary-color);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            border-bottom: 1px solid var(--primary-color);
        }
        
        .top-ticker {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background: #000;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 12px 16px;
            border: none;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .top-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 25s linear infinite;
        }
        
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* PLAYER CARD */
        .player-card {
            background: #000000;
            border-bottom: 1px solid var(--primary-color);
        }
        .video-container {
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            border-bottom: 1px solid var(--primary-color);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .video-menu-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }
        .track-info {
            padding: 16px 16px 8px;
            text-align: center;
        }
        .track-info h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .progress-area {
            padding: 0 16px 8px;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .progress-bar {
            height: 4px;
            background: var(--border-color);
            cursor: pointer;
            overflow: hidden;
            border-radius: 2px;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 8px 16px 16px;
        }
        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-btn {
            font-size: 2.4rem;
            color: var(--primary-color);
        }
        .volume-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px 16px;
        }
        .volume-icon {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            cursor: pointer;
        }
        .volume-slider {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            -webkit-appearance: none;
            border-radius: 2px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-percent {
            font-size: 0.8rem;
            width: 40px;
            text-align: right;
            color: var(--text-secondary);
        }

        /* VÍDEO EXTRA (clicável) */
        .extra-video-container {
            flex: 1;
            background: #000;
            border-top: 1px solid var(--primary-color);
            cursor: pointer;
        }
        .extra-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* DRAWER simplificado */
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #000000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.8);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
        }
        .close-drawer {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 4px;
        }
        .drawer-item {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 14px 16px;
            width: 100%;
            text-align: left;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
        }
        .drawer-item i {
            width: 24px;
            text-align: center;
            color: var(--primary-color);
        }
        .drawer-item:hover {
            background: #1a1a1a;
        }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .drawer-overlay.active {
            display: block;
        }

        /* PLAYLIST */
        .playlist-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
        }
        .playlist-item.playing {
            border-left: 3px solid var(--primary-color);
            background: #1a1a1a;
        }
        .playlist-info {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .playlist-title {
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .playlist-artist {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* NOTIFICAÇÃO */
        .notification {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: #000000;
            color: var(--text-primary);
            padding: 12px 20px;
            box-shadow: 0 8px 20px black;
            z-index: 3000;
            transform: translateY(100px);
            transition: transform 0.3s;
            border-left: 4px solid var(--primary-color);
            max-width: 380px;
            margin: 0 auto;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .notification.show {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            padding: 15px 5px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: #000000;
            border-bottom: 3px solid var(--primary-color);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            border-top: 1px solid var(--primary-color);
        }

        /* BOTÃO DO ANJO AZUL */
        #introAnjoBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            display: none;
            white-space: nowrap;
            transition: background 0.2s;
        }
        #introAnjoBtn:hover {
            background: rgba(255,255,255,0.2);
        }
        #introAnjoBtn i {
            margin-right: 6px;
        }

        /* MENSAGEM DE TOQUE INICIAL (caso autoplay seja bloqueado) */
        #tap-to-start {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        #tap-to-start.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .tap-content {
            background: var(--primary-color);
            color: white;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>
<body class="theme-red">

            <div class="playlist-container" id="playlistContainer"></div>

                    const isPlayingNow = (musica.id === playlist[currentIndex].id && isPlaying && !anjoAtivo);
                    html += `
                        <div class="playlist-item ${isPlayingNow ? 'playing' : ''}" onclick="selectSong(${musica.id})">
                            <div class="playlist-info">
                                <div class="playlist-title">${musica.title || 'Sem título'}</div>
                                <div class="playlist-artist">${musica.artist || 'Artista desconhecido'}</div>
                            </div>
                        </div>
                    `;
                });
                playlistContainer.innerHTML = html || '<div style="text-align:center; padding:10px;">Nenhuma música</div>';
            }

            window.selectSong = function(id) {
                if (anjoAtivo) {
                    showNotification('⏸️ Assista ao vídeo primeiro');
                    return;
                }
                const index = playlist.findIndex(m => m.id === id);
                if (index !== -1) {
                    currentIndex = index;
                    loadTrack(currentIndex);
                    if (isPlaying) playMusic();
                    closeDrawerFunc();
                }
            };

            function loadTrack(index) {
                if (index >= playlist.length) index = 0;
                if (index < 0) index = playlist.length - 1;
                currentIndex = index;
                const track = playlist[currentIndex];
                musicPlayer.src = track.src;
                musicPlayer.load();
                trackTitle.textContent = track.title || 'Sem título';
                trackArtist.textContent = track.artist || 'Artista desconhecido';
                totalTimeEl.textContent = track.duration;
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
                renderPlaylist();
            }

            function playMusic() {
                if (anjoAtivo) return;
                musicPlayer.play()
                    .then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        tapToStart.classList.add('hidden');
                    })
                    .catch(e => {
                        console.warn('Autoplay bloqueado:', e);
                        if (!initialTapShown && !autoPlayAttempted) {
                            tapToStart.classList.remove('hidden');
                            initialTapShown = true;
                        }
                    });
            }

            function pauseMusic() {
                musicPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            function togglePlayPause() {
                if (anjoAtivo) return;
                isPlaying ? pauseMusic() : playMusic();
            }

            function nextTrack() {
                if (anjoAtivo) return;
                currentIndex = (currentIndex + 1) % playlist.length;
                loadTrack(currentIndex);
                if (isPlaying) playMusic();
            }

            function prevTrack() {
                if (anjoAtivo) return;
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                loadTrack(currentIndex);
                if (isPlaying) playMusic();
            }

            // Funções do Anjo Azul
            function ativarAnjoAzul(tempoMs = 30000) {
                if (anjoAtivo || !mainVideo) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = videoAnjoSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao iniciar vídeo anjo:', e));
                }
                anjoAtivo = true;
                introAnjoBtn.style.display = 'block';
                if (isPlaying) pauseMusic(); // pausa a música atual durante o vídeo? Ou não? Vamos manter a música tocando se desejar. Ajuste: não pausar.

                if (anjoTimer) clearTimeout(anjoTimer);
                anjoTimer = setTimeout(() => {
                    restaurarVideoNormal();
                }, tempoMs);
            }

            function restaurarVideoNormal() {
                if (!anjoAtivo || !mainVideo) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = videoOriginalSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao restaurar vídeo:', e));
                }
                anjoAtivo = false;
                introAnjoBtn.style.display = 'none';
                if (anjoTimer) {
                    clearTimeout(anjoTimer);
                    anjoTimer = null;
                }
                // Se a música estava tocando antes, continua? Como não pausamos, ela continua.
            }

            function tocarMusicaSemana() {
                if (!anjoAtivo) return;
                // Cancela o timer
                if (anjoTimer) {
                    clearTimeout(anjoTimer);
                    anjoTimer = null;
                }
                // Restaura vídeo normal
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = videoOriginalSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao restaurar vídeo:', e));
                }
                anjoAtivo = false;
                introAnjoBtn.style.display = 'none';

                // Toca a música da semana (id 11)
                const anjoIndex = playlist.findIndex(m => m.id === 11);
                if (anjoIndex !== -1) {
                    currentIndex = anjoIndex;
                    loadTrack(currentIndex);
                    if (!isPlaying) playMusic();
                } else {
                    showNotification('Música da semana não encontrada');
                }
            }

            // Event listeners
            introAnjoBtn.addEventListener('click', tocarMusicaSemana);

            tapButton.addEventListener('click', function() {
                if (!isPlaying) {
                    playMusic();
                }
                tapToStart.classList.add('hidden');
            });

            musicPlayer.addEventListener('timeupdate', () => {
                if (musicPlayer.duration && !anjoAtivo) {
                    const percent = (musicPlayer.currentTime / musicPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                    const m = Math.floor(musicPlayer.currentTime / 60);
                    const s = Math.floor(musicPlayer.currentTime % 60);
                    currentTimeEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
                }
            });

            musicPlayer.addEventListener('ended', () => {
                if (!anjoAtivo) {
                    nextTrack();
                }
            });

            musicPlayer.addEventListener('error', (e) => {
                console.error('Erro no áudio:', e);
                showNotification('⚠️ Erro, pulando...');
                setTimeout(nextTrack, 1000);
            });

            prevBtn.addEventListener('click', prevTrack);
            nextBtn.addEventListener('click', nextTrack);
            playBtn.addEventListener('click', togglePlayPause);

            volumeSlider.addEventListener('input', (e) => {
                const vol = e.target.value / 100;
                musicPlayer.volume = vol;
                volumePercent.textContent = e.target.value + '%';
                volumeIcon.innerHTML = vol == 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            });

            volumeIcon.addEventListener('click', () => {
                if (musicPlayer.volume > 0) {
                    musicPlayer.volume = 0;
                    volumeSlider.value = 0;
                    volumePercent.textContent = '0%';
                    volumeIcon.innerHTML = '<i class="fas fa-volume-mute"></i>';
                } else {
                    musicPlayer.volume = 0.8;
                    volumeSlider.value = 80;
                    volumePercent.textContent = '80%';
                    volumeIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
                }
            });

            const progressBar = document.getElementById('progressBar');
            progressBar.addEventListener('click', (e) => {
                if (!musicPlayer.duration || anjoAtivo) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                musicPlayer.currentTime = (x / rect.width) * musicPlayer.duration;
            });

            // Drawer
            function openDrawer() {
                drawer.classList.add('open');
                drawerOverlay.classList.add('active');
                renderPlaylist();
            }
            function closeDrawerFunc() {
                drawer.classList.remove('open');
                drawerOverlay.classList.remove('active');
            }
            document.getElementById('videoMenuBtn').addEventListener('click', openDrawer);
            closeDrawer.addEventListener('click', closeDrawerFunc);
            drawerOverlay.addEventListener('click', closeDrawerFunc);

            // Fullscreen
            document.getElementById('fullscreenDrawerBtn').addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });

            // Compartilhar
            document.getElementById('shareDrawerBtn').addEventListener('click', () => {
                if (navigator.share) {
                    navigator.share({ title: 'Rádio Playlist', url: location.href }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(location.href);
                    showNotification('📋 Link copiado!');
                }
            });

            // Vídeo extra
            extraVideoContainer.addEventListener('click', function() {
                window.open('https://www.aluguecopos.com.br/', '_blank');
            });

            // Inicialização
            window.addEventListener('load', () => {
                musicPlayer.volume = 0.8;
                volumeSlider.value = 80;
                volumePercent.textContent = '80%';
                loadTrack(currentIndex);

                // Inicia o vídeo do anjo por 30 segundos
                ativarAnjoAzul(30000);

                const attemptPlay = () => {
                    if (!autoPlayAttempted) {
                        autoPlayAttempted = true;
                        playMusic(); // tenta tocar a música (a primeira da playlist)
                    }
                };
                attemptPlay();

                // Se o autoplay falhar, a mensagem aparecerá
            });
        })();
    </script>
</body>
</html>
