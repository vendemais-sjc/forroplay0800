<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio Playlist • Áudio em segundo plano</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET E VARIÁVEIS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            background-color: #000000 !important;
        }

        /* Temas */
        body.theme-red {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }

        body.theme-lilac {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #b380ff;
            --primary-light: #d6b3ff;
            --primary-dark: #7a4db3;
        }

        body.theme-black {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #bb86fc;
            --primary-light: #cf9eff;
            --primary-dark: #9b6ad0;
        }

        body.theme-gray {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #a0a0a0;
            --primary-light: #c0c0c0;
            --primary-dark: #707070;
        }

        body.theme-blue {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #00a8ff;
            --primary-light: #4bc0ff;
            --primary-dark: #0077be;
        }

        body.theme-green {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #00ff88;
            --primary-light: #6effb8;
            --primary-dark: #00cc6a;
        }

        body.theme-orange {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #ff7700;
            --primary-light: #ffaa33;
            --primary-dark: #cc5500;
        }

        body.theme-pink {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #ff44aa;
            --primary-light: #ff88cc;
            --primary-dark: #cc0088;
        }

        body.theme-purple {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #aa44ff;
            --primary-light: #cc88ff;
            --primary-dark: #7700cc;
        }

        body.theme-yellow {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #ffdd44;
            --primary-light: #ffee88;
            --primary-dark: #ccaa00;
        }

        body.theme-white {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #ffffff;
            --primary-light: #eeeeee;
            --primary-dark: #cccccc;
        }

        body {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }

        /* Modo carro */
        body.car-mode {
            background: #000;
        }
        body.car-mode .player-card,
        body.car-mode .top-bar {
            background: #000;
        }
        body.car-mode .control-btn {
            width: 60px;
            height: 60px;
            font-size: 2rem;
        }
        body.car-mode .top-bar,
        body.car-mode .extra-video-container {
            display: none !important;
        }
        body.car-mode .player-card {
            border: 2px solid var(--primary-color);
            margin-bottom: 0;
        }
        body.car-mode .app {
            justify-content: center;
        }

        .app {
            max-width: 420px;
            width: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        #splash.hidden {
            opacity: 0;
        }
        #splash.hidden.display-none {
            display: none;
        }
        .splash-content {
            text-align: center;
            color: #fff;
        }
        .splash-content i {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
        }
        .splash-content h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .splash-content p {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        /* MENSAGEM PARA TOQUE INICIAL - CENTRALIZADA */
        #tap-to-start {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        #tap-to-start.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .tap-content {
            background: var(--primary-color);
            color: white;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }
        .tap-content i {
            margin-right: 10px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        /* TOP BAR E TICKER */
        .top-bar {
            background: #000;
            border-top: 3px solid var(--primary-color);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            border-bottom: 1px solid var(--primary-color);
        }
        
        .top-ticker {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background: #000;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 12px 16px;
            cursor: pointer;
            border: none;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .top-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 25s linear infinite;
        }
        
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* PLAYER CARD */
        .player-card {
            background: #000000;
            border-bottom: 1px solid var(--primary-color);
        }
        .video-container {
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            border-bottom: 1px solid var(--primary-color);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .video-menu-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }
        .track-info {
            padding: 16px 16px 8px;
            text-align: center;
        }
        .track-info h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .progress-area {
            padding: 0 16px 8px;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .progress-bar {
            height: 4px;
            background: var(--border-color);
            cursor: pointer;
            overflow: hidden;
            border-radius: 2px;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 8px 16px 16px;
        }
        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-btn {
            font-size: 2.4rem;
            color: var(--primary-color);
        }
        .shuffle-player-btn.active {
            color: var(--primary-color);
            transform: scale(1.2);
        }
        .volume-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px 16px;
        }
        .volume-icon {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            cursor: pointer;
        }
        .volume-slider {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            -webkit-appearance: none;
            border-radius: 2px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-percent {
            font-size: 0.8rem;
            width: 40px;
            text-align: right;
            color: var(--text-secondary);
        }

        /* VÍDEO EXTRA (clicável) */
        .extra-video-container {
            flex: 1;
            background: #000;
            border-top: 1px solid var(--primary-color);
            cursor: pointer;
        }
        .extra-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* DRAWER */
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #000000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.8);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
        }
        .close-drawer {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 4px;
        }
        .drawer-item {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 14px 16px;
            width: 100%;
            text-align: left;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
        }
        .drawer-item i {
            width: 24px;
            text-align: center;
            color: var(--primary-color);
        }
        .drawer-item:hover {
            background: #1a1a1a;
        }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .drawer-overlay.active {
            display: block;
        }

        /* SELETOR DE CORES */
        .color-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-option:hover {
            transform: scale(1.2);
        }
        .color-option.active {
            border-color: white;
            box-shadow: 0 0 10px currentColor;
        }
        .color-option.red { background: #e63946; }
        .color-option.lilac { background: #b380ff; }
        .color-option.black { background: #bb86fc; }
        .color-option.gray { background: #a0a0a0; }
        .color-option.blue { background: #00a8ff; }
        .color-option.green { background: #00ff88; }
        .color-option.orange { background: #ff7700; }
        .color-option.pink { background: #ff44aa; }
        .color-option.purple { background: #aa44ff; }
        .color-option.yellow { background: #ffdd44; }
        .color-option.white { background: #ffffff; border: 1px solid #888; }

        /* PAINEL DE ANÚNCIOS */
        .ad-panel {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid var(--border-color);
        }
        .ad-panel h4 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .ad-timer {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            color: var(--primary-color);
        }
        .ad-status {
            font-size: 0.8rem;
            text-align: center;
            color: var(--text-secondary);
            margin: 5px 0;
        }
        .ad-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .ad-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* PLAYLIST */
        .filter-fav {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            align-items: center;
        }
        .filter-fav button {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .filter-fav button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        .playlist-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
        }
        .playlist-item.playing {
            border-left: 3px solid var(--primary-color);
            background: #1a1a1a;
        }
        .playlist-info {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .playlist-title {
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .playlist-artist {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .fav-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 1rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fav-btn.active {
            color: var(--primary-color);
        }

        /* NOTIFICAÇÃO */
        .notification {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: #000000;
            color: var(--text-primary);
            padding: 12px 20px;
            box-shadow: 0 8px 20px black;
            z-index: 3000;
            transform: translateY(100px);
            transition: transform 0.3s;
            border-left: 4px solid var(--primary-color);
            max-width: 380px;
            margin: 0 auto;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .notification.show {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            padding: 15px 5px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: #000000;
            border-bottom: 3px solid var(--primary-color);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            border-top: 1px solid var(--primary-color);
        }

        /* ===== OVERLAY DO ANJO AZUL (a cada 5 músicas) ===== */
        #anjoAzulOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #anjoAzulVideo {
            width: 300px;
            max-width: 90%;
            border-radius: 10px;
        }
        #ouvirMusicaSemanaBtn {
            margin-top: 20px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        #ouvirMusicaSemanaBtn:hover {
            background: rgba(255,255,255,0.3);
        }
        #fecharAnjoAzulBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
        }

        /* ===== BOTÃO DE INTRODUÇÃO DO ANJO AZUL (sobre o vídeo principal) ===== */
        #introAnjoBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            display: none;
            white-space: nowrap;
            transition: background 0.2s;
        }
        #introAnjoBtn:hover {
            background: rgba(255,255,255,0.2);
        }
        #introAnjoBtn i {
            margin-right: 6px;
        }
    </style>
</head>
<body class="theme-red">
    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-content">
            <i class="fas fa-headphones-alt"></i>
            <h1>Rádio Playlist</h1>
            <p>Carregando...</p>
        </div>
    </div>

    <!-- MENSAGEM PARA TOQUE INICIAL (centralizada) -->
    <div id="tap-to-start" class="hidden">
        <div class="tap-content" id="tapButton">
            <i class="fas fa-hand-point-up"></i> Toque para iniciar
        </div>
    </div>

    <div class="app">
        <!-- LETREIRO -->
        <div class="top-bar">
            <div class="top-ticker" id="topTicker" title="Clique para editar">
                <span id="topTickerText">
                    <i class="fas fa-headphones-alt fa-spin"></i> RÁDIO PLAYLIST - A MELHOR SELEÇÃO MUSICAL 
                    <i class="fas fa-music fa-beat"></i> - SEM ANÚNCIOS 
                    <i class="fas fa-radio fa-fade"></i> - ATUALIZAÇÃO DIÁRIA 
                    <i class="fas fa-star fa-spin-pulse"></i> - CONTATO 12 98846-1978
                </span>
            </div>
        </div>

        <!-- PLAYER PRINCIPAL -->
        <div class="player-card">
            <div class="video-container">
                <video autoplay loop muted playsinline id="mainVideo">
                    <source src="macaco.mp4" type="video/mp4">
                </video>
                <video autoplay loop muted playsinline id="carVideo" style="display:none;">
                    <source src="abb.mp4" type="video/mp4">
                </video>
                <button class="video-menu-btn" id="videoMenuBtn"><i class="fas fa-ellipsis-v"></i></button>

                { id: 30, title: "Faz de Conta / Loira e Morena / Muído de Vaquejada", artist: "Wesley Safadão e Toca do Vale", src: "Wesley_Safad_o_e_Toca_do_Vale_Faz_de_Conta_Loira_e_Morena_Mu_do_de_Vaquejada.m4a", duration: "00:00" },

                { id: 32, title: "Senta Danada", artist: "Zé Felipe e Os Barões Da Pisadinha", src: "Zé Felipe e Os Barões Da Pisadinha - Senta Danada.mp3", duration: "00:00" },
                { id: 33, title: "Pergunta Boba", artist: "Zé Vaqueiro", src: "Z_Vaqueiro_Pergunta_Boba_.m4a", duration: "00:00" }
            ];

            // ========== ESTADO GLOBAL ==========
            let playlist = musicas.map(m => ({ ...m, favorite: false }));
            let currentIndex = Math.floor(Math.random() * musicas.length);
            let isPlaying = false;
            let isAdPlaying = false;
            let adsEnabled = true;
            let musicPlayedCount = 0;
            let currentAdIndex = 0;
            let shuffle = false;
            let showingFavorites = false;
            let autoPlayAttempted = false;
            let initialTapShown = false;

            // Variáveis para o overlay Anjo Azul (a cada 5 músicas)
            let anjoAzulOverlay = document.getElementById('anjoAzulOverlay');
            let anjoAzulVideo = document.getElementById('anjoAzulVideo');
            let ouvirMusicaBtn = document.getElementById('ouvirMusicaSemanaBtn');
            let fecharAnjoBtn = document.getElementById('fecharAnjoAzulBtn');
            let savedIndexBeforeAnjo = null;
            let isAnjoActive = false;

            // Variáveis para a introdução do Anjo Azul (ao abrir o site)
            let introAnjoBtn = document.getElementById('introAnjoBtn');
            let introTimer = null;
            let introActive = false;
            let originalVideoSrc = 'macaco.mp4';

            // ========== ELEMENTOS DOM ==========
            const musicPlayer = document.getElementById('musicPlayer');
            const adPlayer = document.getElementById('adPlayer');
            const playBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const trackTitle = document.getElementById('trackTitle');
            const trackArtist = document.getElementById('trackArtist');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumePercent = document.getElementById('volumePercent');
            const volumeIcon = document.getElementById('volumeIconBtn');
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            const splash = document.getElementById('splash');
            const tapToStart = document.getElementById('tap-to-start');
            const tapButton = document.getElementById('tapButton');
            const drawer = document.getElementById('drawer');
            const drawerOverlay = document.getElementById('drawerOverlay');
            const closeDrawer = document.getElementById('closeDrawer');
            const playlistContainer = document.getElementById('playlistContainer');
            const filterFavBtn = document.getElementById('filterFavBtn');
            const showFavBtn = document.getElementById('showFavBtn');
            const adTimerEl = document.getElementById('adTimer');
            const adStatus = document.getElementById('adStatus');
            const toggleAdsBtn = document.getElementById('toggleAdsBtn');
            const testAdBtn = document.getElementById('testAdBtn');
            const skipAdBtn = document.getElementById('skipAdBtn');
            const shuffleBtn = document.getElementById('shufflePlayerBtn');
            const colorOptions = document.querySelectorAll('.color-option');
            const body = document.body;
            const extraVideoContainer = document.getElementById('extraVideoContainer');
            const mainVideo = document.getElementById('mainVideo');
            const carVideo = document.getElementById('carVideo');

            // ========== FUNÇÕES AUXILIARES ==========
            function showNotification(msg) {
                if (!notification || !notificationText) return;
                notificationText.textContent = msg;
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 2000);
            }

            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(() => splash.classList.add('display-none'), 500);
            }

            function loadFavorites() {
                try {
                    const favs = JSON.parse(localStorage.getItem('radioFavorites')) || [];
                    playlist.forEach(m => {
                        m.favorite = favs.includes(m.id);
                    });
                } catch (e) {
                    console.warn('Erro ao carregar favoritos', e);
                }
            }

            function saveFavorites() {
                try {
                    const favs = playlist.filter(m => m.favorite).map(m => m.id);
                    localStorage.setItem('radioFavorites', JSON.stringify(favs));
                } catch (e) {
                    console.warn('Erro ao salvar favoritos', e);
                }
            }

            window.toggleFavorite = function(id) {
                const musica = playlist.find(m => m.id === id);
                if (musica) {
                    musica.favorite = !musica.favorite;
                    saveFavorites();
                    renderPlaylist();
                    showNotification(musica.favorite ? '❤️ Adicionado' : '💔 Removido');
                }
            };

            function renderPlaylist() {
                if (!playlistContainer) return;
                let lista = showingFavorites ? playlist.filter(m => m.favorite) : playlist;
                let html = '';
                lista.forEach((musica) => {
                    const isPlaying = (musica.id === playlist[currentIndex].id && !isAdPlaying && !isAnjoActive);
                    html += `
                        <div class="playlist-item ${isPlaying ? 'playing' : ''}" onclick="selectSong(${musica.id})">
                            <div class="playlist-info">
                                <div class="playlist-title">${musica.title || 'Sem título'}</div>
                                <div class="playlist-artist">${musica.artist || 'Artista desconhecido'}</div>
                            </div>
                            <button class="fav-btn ${musica.favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${musica.id})">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                    `;
                });
                playlistContainer.innerHTML = html || '<div style="text-align:center; padding:10px;">Nenhuma música</div>';
            }

            window.selectSong = function(id) {
                if (isAdPlaying) {
                    showNotification('⏸️ Aguarde o anúncio');
                    return;
                }
                if (isAnjoActive) {
                    showNotification('⏸️ Assista ao vídeo');
                    return;
                }
                const index = playlist.findIndex(m => m.id === id);
                if (index !== -1) {
                    currentIndex = index;
                    loadTrack(currentIndex);
                    if (isPlaying) playMusic();
                    closeDrawerFunc();
                }
            };

            function loadTrack(index) {
                if (!playlist.length) return;
                if (index >= playlist.length) index = 0;
                if (index < 0) index = playlist.length - 1;
                currentIndex = index;
                const track = playlist[currentIndex];
                musicPlayer.src = track.src;
                musicPlayer.load();
                trackTitle.textContent = track.title || 'Sem título';
                trackArtist.textContent = track.artist || 'Artista desconhecido';
                totalTimeEl.textContent = track.duration;
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
                renderPlaylist();
            }

            function playMusic() {
                if (isAdPlaying || isAnjoActive) return;
                musicPlayer.play()
                    .then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        hideSplash();
                        tapToStart.classList.add('hidden');
                    })
                    .catch(e => {
                        console.warn('Autoplay bloqueado:', e);
                        if (!initialTapShown && !autoPlayAttempted) {
                            tapToStart.classList.remove('hidden');
                            initialTapShown = true;
                        }
                    });
            }

            function pauseMusic() {
                musicPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            function togglePlayPause() {
                if (isAdPlaying) {
                    adPlayer.paused ? adPlayer.play() : adPlayer.pause();
                } else if (isAnjoActive) {
                    // Não faz nada no overlay
                } else {
                    isPlaying ? pauseMusic() : playMusic();
                }
            }

            // ========== FUNÇÕES PARA O OVERLAY (a cada 5 músicas) ==========
            function showAnjoAzulOverlay() {
                if (isAdPlaying || isAnjoActive || !anjoAzulOverlay || !anjoAzulVideo) return;
                savedIndexBeforeAnjo = currentIndex;
                if (isPlaying) pauseMusic();
                anjoAzulOverlay.style.display = 'flex';
                isAnjoActive = true;
                anjoAzulVideo.play().catch(e => console.log('Erro vídeo overlay:', e));
            }

            function hideAnjoAzulOverlay(restoreMusic = true) {
                if (!anjoAzulOverlay || !anjoAzulVideo) return;
                anjoAzulOverlay.style.display = 'none';
                anjoAzulVideo.pause();
                isAnjoActive = false;
                if (restoreMusic && savedIndexBeforeAnjo !== null) {
                    currentIndex = savedIndexBeforeAnjo;
                    loadTrack(currentIndex);
                    if (isPlaying) playMusic();
                }
                savedIndexBeforeAnjo = null;
            }

            function playMusicaDaSemanaFromOverlay() {
                if (!isAnjoActive) return;
                const anjoIndex = playlist.findIndex(m => m.id === 11);
                if (anjoIndex !== -1) {
                    hideAnjoAzulOverlay(false);
                    currentIndex = anjoIndex;
                    loadTrack(currentIndex);
                    if (!isPlaying) playMusic();
                } else {
                    showNotification('Música não encontrada');
                }
            }

            // ========== FUNÇÕES PARA A INTRODUÇÃO (ao abrir o site) ==========
            function startIntroAnjo() {
                if (!mainVideo) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = 'https://raw.githubusercontent.com/vendemais-sjc/forroplay0800/main/anjoazul.mp4';
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro intro vídeo:', e));
                }
                introActive = true;
                if (introAnjoBtn) introAnjoBtn.style.display = 'block';

                if (introTimer) clearTimeout(introTimer);
                introTimer = setTimeout(() => {
                    restoreMainVideo();
                }, 5000);
            }

            function restoreMainVideo() {
                if (!introActive || !mainVideo) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = originalVideoSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro restaurar vídeo:', e));
                }
                introActive = false;
                if (introAnjoBtn) introAnjoBtn.style.display = 'none';
                if (introTimer) {
                    clearTimeout(introTimer);
                    introTimer = null;
                }
            }

            function playMusicaDaSemanaFromIntro() {
                if (!introActive) return;
                if (introTimer) {
                    clearTimeout(introTimer);
                    introTimer = null;
                }
                restoreMainVideo();
                const anjoIndex = playlist.findIndex(m => m.id === 11);
                if (anjoIndex !== -1) {
                    currentIndex = anjoIndex;
                    loadTrack(currentIndex);
                    if (!isPlaying) playMusic();
                } else {
                    showNotification('Música não encontrada');
                }
            }

            // ========== AVANÇAR PARA PRÓXIMA FAIXA ==========
            function nextTrack() {
                if (isAdPlaying) return;
                if (isAnjoActive) {
                    hideAnjoAzulOverlay(true);
                    return;
                }

                if (shuffle && playlist.length > 1) {
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * playlist.length);
                    } while (newIndex === currentIndex);
                    currentIndex = newIndex;
                } else {
                    currentIndex = (currentIndex + 1) % playlist.length;
                }
                loadTrack(currentIndex);
                if (isPlaying) playMusic();

                musicPlayedCount++;
                checkAdInterval();

                if (musicPlayedCount > 0 && musicPlayedCount % 5 === 0 && !isAdPlaying && !isAnjoActive) {
                    showAnjoAzulOverlay();
                }
            }

            function prevTrack() {
                if (isAdPlaying) return;
                if (isAnjoActive) {
                    hideAnjoAzulOverlay(true);
                    return;
                }

                if (shuffle && playlist.length > 1) {
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * playlist.length);
                    } while (newIndex === currentIndex);
                    currentIndex = newIndex;
                } else {
                    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                }
                loadTrack(currentIndex);
                if (isPlaying) playMusic();
            }

            // ========== ANÚNCIOS ==========
            function updateAdTimer() {
                if (!adTimerEl) return;
                if (!adsEnabled) {
                    adTimerEl.textContent = 'OFF';
                    return;
                }
                const songsUntilAd = CONFIG.adsInterval - (musicPlayedCount % CONFIG.adsInterval);
                adTimerEl.textContent = songsUntilAd === CONFIG.adsInterval ? 0 : songsUntilAd;
            }

            function playAd() {
                if (!adsEnabled || isAdPlaying || isAnjoActive) return;
                const ad = CONFIG.adsList[currentAdIndex];
                if (!ad) return;
                if (isPlaying) musicPlayer.pause();
                adPlayer.src = ad.src;
                adPlayer.load();
                isAdPlaying = true;
                if (adStatus) adStatus.innerHTML = `<i class="fas fa-volume-up"></i> Tocando: ${ad.title}`;
                if (skipAdBtn) skipAdBtn.style.display = 'inline-block';
                showNotification(`📢 ${ad.title}`);
                adPlayer.play().catch(() => finishAd());
                adPlayer.onended = finishAd;
                adPlayer.onerror = finishAd;
            }

            function finishAd() {
                isAdPlaying = false;
                if (adStatus) adStatus.innerHTML = '<i class="fas fa-compact-disc fa-spin"></i> Aguardando...';
                if (skipAdBtn) skipAdBtn.style.display = 'none';
                if (isPlaying) musicPlayer.play();
                currentAdIndex = (currentAdIndex + 1) % CONFIG.adsList.length;
            }

            function checkAdInterval() {
                if (!adsEnabled) return;
                if (musicPlayedCount > 0 && musicPlayedCount % CONFIG.adsInterval === 0) playAd();
                updateAdTimer();
            }

            function toggleAds() {
                if (!toggleAdsBtn) return;
                adsEnabled = !adsEnabled;
                toggleAdsBtn.innerHTML = adsEnabled ? '<i class="fas fa-toggle-on"></i> Ativo' : '<i class="fas fa-toggle-off"></i> Inativo';
                if (!adsEnabled && isAdPlaying) {
                    adPlayer.pause();
                    finishAd();
                }
                updateAdTimer();
            }

            function testAd() { playAd(); }

            function skipAd() {
                if (isAdPlaying) {
                    adPlayer.pause();
                    finishAd();
                    showNotification('⏭️ Anúncio pulado');
                }
            }

            function setTheme(themeClass) {
                body.className = themeClass;
                localStorage.setItem('radioTheme', themeClass);
                colorOptions.forEach(opt => opt.classList.toggle('active', opt.dataset.theme === themeClass));
                showNotification('🎨 Tema alterado');
            }

            // ========== EVENTOS DE CLIQUE ==========
            if (ouvirMusicaBtn) ouvirMusicaBtn.addEventListener('click', playMusicaDaSemanaFromOverlay);
            if (fecharAnjoBtn) fecharAnjoBtn.addEventListener('click', () => hideAnjoAzulOverlay(true));
            if (introAnjoBtn) introAnjoBtn.addEventListener('click', playMusicaDaSemanaFromIntro);

            if (tapButton) {
                tapButton.addEventListener('click', function() {
                    if (!isPlaying) {
                        playMusic();
                    }
                    tapToStart.classList.add('hidden');
                });
            }

            musicPlayer.addEventListener('ended', function() {
                if (!isAdPlaying && !isAnjoActive) {
                    if (playlist[currentIndex].id === 11 && savedIndexBeforeAnjo !== null) {
                        currentIndex = savedIndexBeforeAnjo;
                        loadTrack(currentIndex);
                        if (isPlaying) playMusic();
                        savedIndexBeforeAnjo = null;
                    } else {
                        nextTrack();
                    }
                }
            });

            musicPlayer.addEventListener('timeupdate', () => {
                if (musicPlayer.duration && !isAdPlaying && !isAnjoActive) {
                    const percent = (musicPlayer.currentTime / musicPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                    const m = Math.floor(musicPlayer.currentTime / 60);
                    const s = Math.floor(musicPlayer.currentTime % 60);
                    currentTimeEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
                }
            });

            musicPlayer.addEventListener('error', (e) => {
                console.error('Erro no áudio:', e);
                showNotification('⚠️ Erro, pulando...');
                setTimeout(nextTrack, 1000);
            });

            if (prevBtn) prevBtn.addEventListener('click', prevTrack);
            if (nextBtn) nextBtn.addEventListener('click', nextTrack);
            if (playBtn) playBtn.addEventListener('click', togglePlayPause);

            if (shuffleBtn) {
                shuffleBtn.addEventListener('click', () => {
                    shuffle = !shuffle;
                    shuffleBtn.classList.toggle('active', shuffle);
                    showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial');
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    const vol = e.target.value / 100;
                    musicPlayer.volume = vol;
                    adPlayer.volume = vol;
                    volumePercent.textContent = e.target.value + '%';
                    volumeIcon.innerHTML = vol == 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                });
            }

            if (volumeIcon) {
                volumeIcon.addEventListener('click', () => {
                    if (musicPlayer.volume > 0) {
                        musicPlayer.volume = adPlayer.volume = 0;
                        volumeSlider.value = 0;
                        volumePercent.textContent = '0%';
                        volumeIcon.innerHTML = '<i class="fas fa-volume-mute"></i>';
                    } else {
                        musicPlayer.volume = adPlayer.volume = 0.8;
                        volumeSlider.value = 80;
                        volumePercent.textContent = '80%';
                        volumeIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
                    }
                });
            }

            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                progressBar.addEventListener('click', (e) => {
                    if (isAdPlaying || !musicPlayer.duration || isAnjoActive) return;
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    musicPlayer.currentTime = (x / rect.width) * musicPlayer.duration;
                });
            }

            // ========== DRAWER ==========
            function openDrawer() {
                if (!drawer || !drawerOverlay) return;
                drawer.classList.add('open');
                drawerOverlay.classList.add('active');
                renderPlaylist();
            }
            function closeDrawerFunc() {
                if (!drawer || !drawerOverlay) return;
                drawer.classList.remove('open');
                drawerOverlay.classList.remove('active');
            }
            const videoMenuBtn = document.getElementById('videoMenuBtn');
            if (videoMenuBtn) videoMenuBtn.addEventListener('click', openDrawer);
            if (closeDrawer) closeDrawer.addEventListener('click', closeDrawerFunc);
            if (drawerOverlay) drawerOverlay.addEventListener('click', closeDrawerFunc);

            // ========== FILTRO DE FAVORITOS ==========
            if (filterFavBtn) {
                filterFavBtn.addEventListener('click', () => {
                    showingFavorites = false;
                    filterFavBtn.classList.add('active');
                    showFavBtn.classList.remove('active');
                    renderPlaylist();
                });
            }
            if (showFavBtn) {
                showFavBtn.addEventListener('click', () => {
                    showingFavorites = true;
                    showFavBtn.classList.add('active');
                    filterFavBtn.classList.remove('active');
                    renderPlaylist();
                });
            }

            // ========== OUTRAS OPÇÕES DO DRAWER ==========
            const fullscreenBtn = document.getElementById('fullscreenDrawerBtn');
            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', () => {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                    else document.exitFullscreen();
                });
            }

            const shareBtn = document.getElementById('shareDrawerBtn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({ title: 'Rádio Playlist', url: location.href }).catch(() => {});
                    } else {
                        navigator.clipboard.writeText(location.href);
                        showNotification('📋 Link copiado!');
                    }
                });
            }

            const carModeBtn = document.getElementById('carModeDrawerBtn');
            if (carModeBtn) {
                carModeBtn.addEventListener('click', () => {
                    document.body.classList.toggle('car-mode');
                    toggleCarModeVideos();
                    showNotification('🚗 Modo carro ' + (document.body.classList.contains('car-mode') ? 'ativado' : 'desativado'));
                });
            }

            // Anúncios
            if (toggleAdsBtn) toggleAdsBtn.addEventListener('click', toggleAds);
            if (testAdBtn) testAdBtn.addEventListener('click', testAd);
            if (skipAdBtn) skipAdBtn.addEventListener('click', skipAd);

            // Cores
            const savedTheme = localStorage.getItem('radioTheme') || 'theme-red';
            setTheme(savedTheme);
            colorOptions.forEach(opt => opt.addEventListener('click', () => setTheme(opt.dataset.theme)));

            // Vídeo extra clicável
            if (extraVideoContainer) {
                extraVideoContainer.addEventListener('click', function() {
                    window.open('https://www.aluguecopos.com.br/', '_blank');
                });
            }

            function toggleCarModeVideos() {
                const isCarMode = document.body.classList.contains('car-mode');
                if (isCarMode) {
                    mainVideo.style.display = 'none';
                    carVideo.style.display = 'block';
                    mainVideo.pause();
                    carVideo.play().catch(e => console.log('Erro vídeo carro:', e));
                } else {
                    mainVideo.style.display = 'block';
                    carVideo.style.display = 'none';
                    carVideo.pause();
                    mainVideo.play().catch(e => console.log('Erro vídeo principal:', e));
                }
            }

            // ========== INICIALIZAÇÃO ==========
            window.addEventListener('load', () => {
                loadFavorites();
                musicPlayer.volume = CONFIG.defaultVolume / 100;
                adPlayer.volume = CONFIG.defaultVolume / 100;
                volumeSlider.value = CONFIG.defaultVolume;
                volumePercent.textContent = CONFIG.defaultVolume + '%';
                loadTrack(currentIndex);
                
                mainVideo.style.display = 'block';
                carVideo.style.display = 'none';
                startIntroAnjo();

                const attemptPlay = () => {
                    if (!autoPlayAttempted) {
                        autoPlayAttempted = true;
                        playMusic();
                    }
                };
                attemptPlay();
                setTimeout(hideSplash, 3000);
                updateAdTimer();
            });
        })();
    </script>
</body>
</html>
