<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio Playlist • Áudio em segundo plano</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            background-color: #000000 !important;
        }

        /* Temas (iguais) */
        body.theme-red {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }
        /* ... outros temas (mantidos) ... */

        body.theme-white {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #ffffff;
            --primary-light: #eeeeee;
            --primary-dark: #cccccc;
        }

        body {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-drawer: #050505;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --primary-color: #e63946;
            --primary-light: #ff6b7a;
            --primary-dark: #b71c1c;
        }

        /* ... (todo o CSS permanece igual) ... */
        /* (manter o mesmo CSS da resposta anterior, por brevidade não repetirei todo o estilo aqui, mas no código final estará completo) */

    </style>
</head>
<body class="theme-red">
    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-content">
            <i class="fas fa-headphones-alt"></i>
            <h1>Rádio Playlist</h1>
            <p>Carregando...</p>
        </div>
    </div>

    <!-- MENSAGEM PARA TOQUE INICIAL (centralizada) -->
    <div id="tap-to-start" class="hidden">
        <div class="tap-content" id="tapButton">
            <i class="fas fa-hand-point-up"></i> Toque para iniciar
        </div>
    </div>

    <div class="app">
        <!-- LETREIRO -->
        <div class="top-bar">
            <div class="top-ticker" id="topTicker" title="Clique para editar">
                <span id="topTickerText">
                    <i class="fas fa-headphones-alt fa-spin"></i> RÁDIO PLAYLIST - A MELHOR SELEÇÃO MUSICAL 
                    <i class="fas fa-music fa-beat"></i> - SEM ANÚNCIOS 
                    <i class="fas fa-radio fa-fade"></i> - ATUALIZAÇÃO DIÁRIA 
                    <i class="fas fa-star fa-spin-pulse"></i> - CONTATO 12 98846-1978
                </span>
            </div>
        </div>

        <!-- PLAYER PRINCIPAL -->
        <div class="player-card">
            <div class="video-container">
                <video autoplay loop muted playsinline id="mainVideo">
                    <source src="macaco.mp4" type="video/mp4">
                </video>
                <video autoplay loop muted playsinline id="carVideo" style="display:none;">
                    <source src="abb.mp4" type="video/mp4">
                </video>
                <button class="video-menu-btn" id="videoMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
                <!-- Botão de introdução do Anjo Azul -->
                <button id="introAnjoBtn"><i class="fas fa-play-circle"></i> clique aqui para ouvir</button>
            </div>
            <div class="track-info">
                <h2 id="trackTitle">Rádio Playlist</h2>
                <p id="trackArtist">Carregando...</p>
            </div>
            <div class="progress-area">
                <div class="progress-time">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="shufflePlayerBtn"><i class="fas fa-random"></i></button>
                <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="volume-area">
                <button class="volume-icon" id="volumeIconBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                <span class="volume-percent" id="volumePercent">80%</span>
            </div>
        </div>

        <!-- VÍDEO EXTRA (clicável) -->
        <div class="extra-video-container" id="extraVideoContainer">
            <video autoplay loop muted playsinline id="extraVideo">
                <source src="coposze.mp4" type="video/mp4">
            </video>
        </div>

        <div class="footer">Rádio Playlist 2024 © Desenvolvido Por Roger Mendes</div>
    </div>

                { id: 129, title: "Quem sabe isso quer dizer amor", artist: "Lô Borges", src: "Quem_sabe_Quem_sabe_isso_quer_dizer_amor_muzzik.m4a", duration: "00:01" },

                { id: 26, title: "Despacito", artist: "Solange Almeida & Erika", src: "Solange Almeida & Erika-despacito.m4a", duration: "00:00" },
                { id: 27, title: "SONHO DE AMOR", artist: "Circuito Musical e Rai Saia Rodada", src: "SONHO_DE_AMOR_Circuito_Musical_e_RaiSaiaRodada_.m4a", duration: "00:00" },
                { id: 28, title: "Tarde Demais / Não Dá Prazer", artist: "Limão com Mel e Tropykália", src: "Tarde_Demais_N_o_D_Prazer_Lim_o_com_Mel_e_Tropyk_lia_.m4a", duration: "00:00" },
                { id: 29, title: "Vou Falar Que Não Quero", artist: "Vitor Fernandes", src: "VOU FALAR QUE NÃO QUERO - Vitor Fernandes.mp3", duration: "00:00" },
                { id: 30, title: "Faz de Conta / Loira e Morena / Muído de Vaquejada", artist: "Wesley Safadão e Toca do Vale", src: "Wesley_Safad_o_e_Toca_do_Vale_Faz_de_Conta_Loira_e_Morena_Mu_do_de_Vaquejada.m4a", duration: "00:00" },
                { id: 31, title: "Forró Sacode / Patricinha", artist: "Wesley Safadão e Tony Guerra", src: "Wesley_Safad_o_e_Tony_Guerra_Forr_Sacode_Patricinha_.m4a", duration: "00:00" },
                { id: 32, title: "Senta Danada", artist: "Zé Felipe e Os Barões Da Pisadinha", src: "Zé Felipe e Os Barões Da Pisadinha - Senta Danada.mp3", duration: "00:00" },
                { id: 33, title: "Pergunta Boba", artist: "Zé Vaqueiro", src: "Z_Vaqueiro_Pergunta_Boba_.m4a", duration: "00:00" }
            ];

            // ========== ESTADO GLOBAL ==========
            let playlist = musicas.map(m => ({ ...m, favorite: false }));
            let currentIndex = Math.floor(Math.random() * musicas.length);
            let isPlaying = false;
            let isAdPlaying = false;
            let adsEnabled = true;
            let musicPlayedCount = 0;
            let currentAdIndex = 0;
            let shuffle = false;
            let showingFavorites = false;
            let autoPlayAttempted = false; // já tentou autoplay na inicialização?
            let initialTapShown = false;   // se a mensagem de toque já foi mostrada na inicialização

            // Variáveis para o overlay Anjo Azul (a cada 5 músicas)
            let anjoAzulOverlay = document.getElementById('anjoAzulOverlay');
            let anjoAzulVideo = document.getElementById('anjoAzulVideo');
            let ouvirMusicaBtn = document.getElementById('ouvirMusicaSemanaBtn');
            let fecharAnjoBtn = document.getElementById('fecharAnjoAzulBtn');
            let savedIndexBeforeAnjo = null;
            let isAnjoActive = false;

            // Variáveis para a introdução do Anjo Azul (ao abrir o site)
            let introAnjoBtn = document.getElementById('introAnjoBtn');
            let introTimer = null;
            let introActive = false;
            let originalVideoSrc = 'macaco.mp4';

            // ========== ELEMENTOS DOM ==========
            const musicPlayer = document.getElementById('musicPlayer');
            const adPlayer = document.getElementById('adPlayer');
            const playBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const trackTitle = document.getElementById('trackTitle');
            const trackArtist = document.getElementById('trackArtist');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumePercent = document.getElementById('volumePercent');
            const volumeIcon = document.getElementById('volumeIconBtn');
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            const splash = document.getElementById('splash');
            const tapToStart = document.getElementById('tap-to-start');
            const tapButton = document.getElementById('tapButton');
            const drawer = document.getElementById('drawer');
            const drawerOverlay = document.getElementById('drawerOverlay');
            const closeDrawer = document.getElementById('closeDrawer');
            const playlistContainer = document.getElementById('playlistContainer');
            const filterFavBtn = document.getElementById('filterFavBtn');
            const showFavBtn = document.getElementById('showFavBtn');
            const adTimerEl = document.getElementById('adTimer');
            const adStatus = document.getElementById('adStatus');
            const toggleAdsBtn = document.getElementById('toggleAdsBtn');
            const testAdBtn = document.getElementById('testAdBtn');
            const skipAdBtn = document.getElementById('skipAdBtn');
            const shuffleBtn = document.getElementById('shufflePlayerBtn');
            const colorOptions = document.querySelectorAll('.color-option');
            const body = document.body;
            const extraVideoContainer = document.getElementById('extraVideoContainer');
            const mainVideo = document.getElementById('mainVideo');
            const carVideo = document.getElementById('carVideo');

            // ========== FUNÇÕES AUXILIARES ==========
            function showNotification(msg) {
                notificationText.textContent = msg;
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 2000);
            }

            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(() => splash.classList.add('display-none'), 500);
            }

            function loadFavorites() {
                const favs = JSON.parse(localStorage.getItem('radioFavorites')) || [];
                playlist.forEach(m => {
                    m.favorite = favs.includes(m.id);
                });
            }

            function saveFavorites() {
                const favs = playlist.filter(m => m.favorite).map(m => m.id);
                localStorage.setItem('radioFavorites', JSON.stringify(favs));
            }

            window.toggleFavorite = function(id) {
                const musica = playlist.find(m => m.id === id);
                if (musica) {
                    musica.favorite = !musica.favorite;
                    saveFavorites();
                    renderPlaylist();
                    showNotification(musica.favorite ? '❤️ Adicionado aos favoritos' : '💔 Removido dos favoritos');
                }
            };

            function renderPlaylist() {
                let lista = showingFavorites ? playlist.filter(m => m.favorite) : playlist;
                let html = '';
                lista.forEach((musica) => {
                    const isPlaying = (musica.id === playlist[currentIndex].id && !isAdPlaying && !isAnjoActive);
                    html += `
                        <div class="playlist-item ${isPlaying ? 'playing' : ''}" onclick="selectSong(${musica.id})">
                            <div class="playlist-info">
                                <div class="playlist-title">${musica.title || 'Sem título'}</div>
                                <div class="playlist-artist">${musica.artist || 'Artista desconhecido'}</div>
                            </div>
                            <button class="fav-btn ${musica.favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${musica.id})">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                    `;
                });
                playlistContainer.innerHTML = html || '<div style="text-align:center; padding:10px;">Nenhuma música</div>';
            }

            window.selectSong = function(id) {
                if (isAdPlaying) {
                    showNotification('⏸️ Aguarde o anúncio terminar');
                    return;
                }
                if (isAnjoActive) {
                    showNotification('⏸️ Assista ao vídeo primeiro');
                    return;
                }
                const index = playlist.findIndex(m => m.id === id);
                if (index !== -1) {
                    currentIndex = index;
                    loadTrack(currentIndex);
                    if (isPlaying) playMusic();
                    closeDrawerFunc();
                }
            };

            function loadTrack(index) {
                if (!playlist.length) return;
                if (index >= playlist.length) index = 0;
                if (index < 0) index = playlist.length - 1;
                currentIndex = index;
                const track = playlist[currentIndex];
                musicPlayer.src = track.src;
                musicPlayer.load();
                trackTitle.textContent = track.title || 'Sem título';
                trackArtist.textContent = track.artist || 'Artista desconhecido';
                totalTimeEl.textContent = track.duration;
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
                renderPlaylist();
            }

            function playMusic() {
                if (isAdPlaying || isAnjoActive) return;
                musicPlayer.play()
                    .then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        hideSplash();
                        // Esconde a mensagem de toque se ela estiver visível
                        tapToStart.classList.add('hidden');
                    })
                    .catch(e => {
                        console.warn('Autoplay bloqueado:', e);
                        // Só mostra a mensagem se ainda não foi mostrada na inicialização
                        if (!initialTapShown && !autoPlayAttempted) {
                            tapToStart.classList.remove('hidden');
                            initialTapShown = true;
                        }
                    });
            }

            function pauseMusic() {
                musicPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            function togglePlayPause() {
                if (isAdPlaying) {
                    adPlayer.paused ? adPlayer.play() : adPlayer.pause();
                } else if (isAnjoActive) {
                    // Não faz nada no overlay
                } else {
                    isPlaying ? pauseMusic() : playMusic();
                }
            }

            // ========== FUNÇÕES PARA O OVERLAY (a cada 5 músicas) ==========
            function showAnjoAzulOverlay() {
                if (isAdPlaying || isAnjoActive) return;
                savedIndexBeforeAnjo = currentIndex;
                if (isPlaying) pauseMusic();
                anjoAzulOverlay.style.display = 'flex';
                isAnjoActive = true;
                anjoAzulVideo.play().catch(e => console.log('Vídeo anjo azul não pôde ser reproduzido:', e));
            }

            function hideAnjoAzulOverlay(restoreMusic = true) {
                anjoAzulOverlay.style.display = 'none';
                anjoAzulVideo.pause();
                isAnjoActive = false;
                if (restoreMusic && savedIndexBeforeAnjo !== null) {
                    currentIndex = savedIndexBeforeAnjo;
                    loadTrack(currentIndex);
                    if (isPlaying) playMusic();
                }
                savedIndexBeforeAnjo = null;
            }

            function playMusicaDaSemanaFromOverlay() {
                if (!isAnjoActive) return;
                const anjoIndex = playlist.findIndex(m => m.id === 11);
                if (anjoIndex !== -1) {
                    hideAnjoAzulOverlay(false);
                    currentIndex = anjoIndex;
                    loadTrack(currentIndex);
                    if (!isPlaying) playMusic();
                } else {
                    showNotification('Música da semana não encontrada');
                }
            }

            // ========== FUNÇÕES PARA A INTRODUÇÃO (ao abrir o site) ==========
            function startIntroAnjo() {
                if (!mainVideo) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = 'https://raw.githubusercontent.com/vendemais-sjc/forroplay0800/main/anjoazul.mp4';
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao iniciar vídeo de introdução:', e));
                }
                introActive = true;
                introAnjoBtn.style.display = 'block';

                if (introTimer) clearTimeout(introTimer);
                introTimer = setTimeout(() => {
                    restoreMainVideo();
                }, 5000);
            }

            function restoreMainVideo() {
                if (!introActive) return;
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = originalVideoSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao restaurar vídeo principal:', e));
                }
                introActive = false;
                introAnjoBtn.style.display = 'none';
                if (introTimer) {
                    clearTimeout(introTimer);
                    introTimer = null;
                }
            }

            function playMusicaDaSemanaFromIntro() {
                if (!introActive) return;
                if (introTimer) {
                    clearTimeout(introTimer);
                    introTimer = null;
                }
                const source = mainVideo.querySelector('source');
                if (source) {
                    source.src = originalVideoSrc;
                    mainVideo.load();
                    mainVideo.play().catch(e => console.log('Erro ao restaurar vídeo principal:', e));
                }
                introActive = false;
                introAnjoBtn.style.display = 'none';

                const anjoIndex = playlist.findIndex(m => m.id === 11);
                if (anjoIndex !== -1) {
                    currentIndex = anjoIndex;
                    loadTrack(currentIndex);
                    if (!isPlaying) playMusic();
                } else {
                    showNotification('Música da semana não encontrada');
                }
            }

            // ========== AVANÇAR PARA PRÓXIMA FAIXA ==========
            function nextTrack() {
                if (isAdPlaying) return;
                if (isAnjoActive) {
                    hideAnjoAzulOverlay(true);
                    return;
                }

                if (shuffle && playlist.length > 1) {
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * playlist.length);
                    } while (newIndex === currentIndex);
                    currentIndex = newIndex;
                } else {
                    currentIndex = (currentIndex + 1) % playlist.length;
                }
                loadTrack(currentIndex);
                if (isPlaying) playMusic();

                musicPlayedCount++;
                checkAdInterval();

                if (musicPlayedCount > 0 && musicPlayedCount % 5 === 0 && !isAdPlaying && !isAnjoActive) {
                    showAnjoAzulOverlay();
                }
            }

            function prevTrack() {
                if (isAdPlaying) return;
                if (isAnjoActive) {
                    hideAnjoAzulOverlay(true);
                    return;
                }

                if (shuffle && playlist.length > 1) {
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * playlist.length);
                    } while (newIndex === currentIndex);
                    currentIndex = newIndex;
                } else {
                    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                }
                loadTrack(currentIndex);
                if (isPlaying) playMusic();
            }

            // ========== ANÚNCIOS ==========
            function updateAdTimer() {
                if (!adsEnabled) {
                    adTimerEl.textContent = 'OFF';
                    return;
                }
                const songsUntilAd = CONFIG.adsInterval - (musicPlayedCount % CONFIG.adsInterval);
                adTimerEl.textContent = songsUntilAd === CONFIG.adsInterval ? 0 : songsUntilAd;
            }

            function playAd() {
                if (!adsEnabled || isAdPlaying || isAnjoActive) return;
                const ad = CONFIG.adsList[currentAdIndex];
                if (!ad) return;
                if (isPlaying) musicPlayer.pause();
                adPlayer.src = ad.src;
                adPlayer.load();
                isAdPlaying = true;
                adStatus.innerHTML = `<i class="fas fa-volume-up"></i> Tocando: ${ad.title}`;
                skipAdBtn.style.display = 'inline-block';
                showNotification(`📢 Anúncio: ${ad.title}`);
                adPlayer.play().catch(() => finishAd());
                adPlayer.onended = finishAd;
                adPlayer.onerror = finishAd;
            }

            function finishAd() {
                isAdPlaying = false;
                adStatus.innerHTML = '<i class="fas fa-compact-disc fa-spin"></i> Aguardando...';
                skipAdBtn.style.display = 'none';
                if (isPlaying) musicPlayer.play();
                currentAdIndex = (currentAdIndex + 1) % CONFIG.adsList.length;
            }

            function checkAdInterval() {
                if (!adsEnabled) return;
                if (musicPlayedCount > 0 && musicPlayedCount % CONFIG.adsInterval === 0) playAd();
                updateAdTimer();
            }

            function toggleAds() {
                adsEnabled = !adsEnabled;
                toggleAdsBtn.innerHTML = adsEnabled ? '<i class="fas fa-toggle-on"></i> Ativo' : '<i class="fas fa-toggle-off"></i> Inativo';
                if (!adsEnabled && isAdPlaying) {
                    adPlayer.pause();
                    finishAd();
                }
                updateAdTimer();
            }

            function testAd() { playAd(); }

            function skipAd() {
                if (isAdPlaying) {
                    adPlayer.pause();
                    finishAd();
                    showNotification('⏭️ Anúncio pulado');
                }
            }

            function setTheme(themeClass) {
                body.className = themeClass;
                localStorage.setItem('radioTheme', themeClass);
                colorOptions.forEach(opt => opt.classList.toggle('active', opt.dataset.theme === themeClass));
                showNotification('🎨 Tema alterado');
            }

            // ========== EVENTOS DE CLIQUE ==========
            ouvirMusicaBtn.addEventListener('click', playMusicaDaSemanaFromOverlay);
            fecharAnjoBtn.addEventListener('click', () => hideAnjoAzulOverlay(true));
            introAnjoBtn.addEventListener('click', playMusicaDaSemanaFromIntro);

            tapButton.addEventListener('click', function() {
                if (!isPlaying) {
                    playMusic();
                }
                tapToStart.classList.add('hidden');
            });

            musicPlayer.addEventListener('ended', function() {
                if (!isAdPlaying && !isAnjoActive) {
                    if (playlist[currentIndex].id === 11 && savedIndexBeforeAnjo !== null) {
                        currentIndex = savedIndexBeforeAnjo;
                        loadTrack(currentIndex);
                        if (isPlaying) playMusic();
                        savedIndexBeforeAnjo = null;
                    } else {
                        nextTrack();
                    }
                }
            });

            // ========== EVENTOS DO PLAYER ==========
            musicPlayer.addEventListener('timeupdate', () => {
                if (musicPlayer.duration && !isAdPlaying && !isAnjoActive) {
                    const percent = (musicPlayer.currentTime / musicPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                    const m = Math.floor(musicPlayer.currentTime / 60);
                    const s = Math.floor(musicPlayer.currentTime % 60);
                    currentTimeEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
                }
            });

            musicPlayer.addEventListener('error', (e) => {
                console.error('Erro no áudio:', e);
                showNotification('⚠️ Erro na música, pulando...');
                setTimeout(nextTrack, 1000);
            });

            prevBtn.addEventListener('click', prevTrack);
            nextBtn.addEventListener('click', nextTrack);
            playBtn.addEventListener('click', togglePlayPause);

            shuffleBtn.addEventListener('click', () => {
                shuffle = !shuffle;
                shuffleBtn.classList.toggle('active', shuffle);
                showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial');
            });

            volumeSlider.addEventListener('input', (e) => {
                const vol = e.target.value / 100;
                musicPlayer.volume = vol;
                adPlayer.volume = vol;
                volumePercent.textContent = e.target.value + '%';
                volumeIcon.innerHTML = vol == 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            });

            volumeIcon.addEventListener('click', () => {
                if (musicPlayer.volume > 0) {
                    musicPlayer.volume = adPlayer.volume = 0;
                    volumeSlider.value = 0;
                    volumePercent.textContent = '0%';
                    volumeIcon.innerHTML = '<i class="fas fa-volume-mute"></i>';
                } else {
                    musicPlayer.volume = adPlayer.volume = 0.8;
                    volumeSlider.value = 80;
                    volumePercent.textContent = '80%';
                    volumeIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
                }
            });

            document.getElementById('progressBar').addEventListener('click', (e) => {
                if (isAdPlaying || !musicPlayer.duration || isAnjoActive) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                musicPlayer.currentTime = (x / rect.width) * musicPlayer.duration;
            });

            // ========== DRAWER ==========
            function openDrawer() {
                drawer.classList.add('open');
                drawerOverlay.classList.add('active');
                renderPlaylist();
            }
            function closeDrawerFunc() {
                drawer.classList.remove('open');
                drawerOverlay.classList.remove('active');
            }
            document.getElementById('videoMenuBtn').addEventListener('click', openDrawer);
            closeDrawer.addEventListener('click', closeDrawerFunc);
            drawerOverlay.addEventListener('click', closeDrawerFunc);

            // ========== FILTRO DE FAVORITOS ==========
            filterFavBtn.addEventListener('click', () => {
                showingFavorites = false;
                filterFavBtn.classList.add('active');
                showFavBtn.classList.remove('active');
                renderPlaylist();
            });
            showFavBtn.addEventListener('click', () => {
                showingFavorites = true;
                showFavBtn.classList.add('active');
                filterFavBtn.classList.remove('active');
                renderPlaylist();
            });

            // ========== OUTRAS OPÇÕES DO DRAWER ==========
            document.getElementById('fullscreenDrawerBtn').addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });

            document.getElementById('shareDrawerBtn').addEventListener('click', () => {
                if (navigator.share) {
                    navigator.share({ title: 'Rádio Playlist', url: location.href }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(location.href);
                    showNotification('📋 Link copiado!');
                }
            });

            document.getElementById('carModeDrawerBtn').addEventListener('click', () => {
                document.body.classList.toggle('car-mode');
                toggleCarModeVideos();
                showNotification('🚗 Modo carro ' + (document.body.classList.contains('car-mode') ? 'ativado' : 'desativado'));
            });

            // Anúncios
            toggleAdsBtn.addEventListener('click', toggleAds);
            testAdBtn.addEventListener('click', testAd);
            skipAdBtn.addEventListener('click', skipAd);

            // Cores
            const savedTheme = localStorage.getItem('radioTheme') || 'theme-red';
            setTheme(savedTheme);
            colorOptions.forEach(opt => opt.addEventListener('click', () => setTheme(opt.dataset.theme)));

            // Vídeo extra clicável
            if (extraVideoContainer) {
                extraVideoContainer.addEventListener('click', function() {
                    window.open('https://www.aluguecopos.com.br/', '_blank');
                });
            }

            function toggleCarModeVideos() {
                const isCarMode = document.body.classList.contains('car-mode');
                if (isCarMode) {
                    mainVideo.style.display = 'none';
                    carVideo.style.display = 'block';
                    mainVideo.pause();
                    carVideo.play().catch(e => console.log('Erro ao iniciar vídeo do carro:', e));
                } else {
                    mainVideo.style.display = 'block';
                    carVideo.style.display = 'none';
                    carVideo.pause();
                    mainVideo.play().catch(e => console.log('Erro ao iniciar vídeo principal:', e));
                }
            }

            // ========== INICIALIZAÇÃO ==========
            window.addEventListener('load', () => {
                loadFavorites();
                musicPlayer.volume = CONFIG.defaultVolume / 100;
                adPlayer.volume = CONFIG.defaultVolume / 100;
                volumeSlider.value = CONFIG.defaultVolume;
                volumePercent.textContent = CONFIG.defaultVolume + '%';
                loadTrack(currentIndex);
                
                mainVideo.style.display = 'block';
                carVideo.style.display = 'none';
                startIntroAnjo();

                // Tentativa de autoplay
                const attemptPlay = () => {
                    if (!autoPlayAttempted) {
                        autoPlayAttempted = true;
                        playMusic(); // Se falhar, mostrará a mensagem
                    }
                };
                attemptPlay();
                setTimeout(hideSplash, 3000);
                updateAdTimer();
            });
        })();
    </script>
</body>
</html>
